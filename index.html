
 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Happy Birthday Babiii</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
background:
linear-gradient(
to bottom,
#020111 0%,
#191621 40%,
#320012 100%);
font-family:Georgia,serif;
}

canvas{
position:fixed;
top:0;
left:0;
}

.title{
position:absolute;
top:30px;
width:100%;
text-align:center;
z-index:100;
}

.title h1{
color:gold;
font-size:3rem;
text-shadow:0 0 20px gold;
}

.title h2{
color:#ff99bb;
margin-top:10px;
}

.tree{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:600px;
height:700px;
z-index:10;
}

.trunk{
position:absolute;
bottom:0;
left:270px;
width:60px;
height:260px;
background:#4b2e1f;
border-radius:30px;
}

.branch{
position:absolute;
background:#4b2e1f;
border-radius:50px;
transform-origin:bottom;
}

.b1{
width:220px;
height:18px;
left:130px;
bottom:260px;
transform:rotate(-35deg);
}

.b2{
width:220px;
height:18px;
left:250px;
bottom:260px;
transform:rotate(35deg);
}

.b3{
width:160px;
height:14px;
left:170px;
bottom:360px;
transform:rotate(-60deg);
}

.b4{
width:160px;
height:14px;
left:270px;
bottom:360px;
transform:rotate(60deg);
}

.canopy{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
width:420px;
height:360px;
}

.heart{
position:absolute;
font-size:32px;
color:#ff2d55;
text-shadow:0 0 12px red;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.2);
}
}

.photo-holder{
position:absolute;
top:170px;
left:50%;
transform:translateX(-50%);
width:170px;
height:170px;
border:4px solid gold;
border-radius:50%;
box-shadow:0 0 30px gold;
background:rgba(255,255,255,.1);
z-index:50;
}

.moon{
position:absolute;
top:80px;
right:120px;
width:120px;
height:120px;
border-radius:50%;
background:white;
box-shadow:0 0 60px white;
}

 #fairyLights{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:4;
}

.light{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:#FFD700;
    box-shadow:
        0 0 6px #FFD700,
        0 0 12px #FFD700,
        0 0 24px orange;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{

0%{
opacity:.2;
transform:scale(.8);
}

50%{
opacity:1;
transform:scale(1.6);
}

100%{
opacity:.3;
transform:scale(.8);
}

}

 

</style>
</head>

<body>

 <div id="fairyLights"></div>

<canvas id="stars"></canvas>

<div class="moon"></div>

<div class="title">
<h1>🎂 Happy Birthday Babiii 🎂</h1>
<h2>I Love You ❤️ Forever & Always</h2>
</div>

<div class="tree">

<div class="trunk"></div>

<div class="branch b1"></div>
<div class="branch b2"></div>
<div class="branch b3"></div>
<div class="branch b4"></div>

<div class="canopy" id="canopy"></div>

<div class="photo-holder"></div>

</div>

<script>

const canopy=document.getElementById('canopy');

for(let i=0;i<220;i++){

const h=document.createElement('div');

h.className='heart';

const angle=Math.random()*Math.PI*2;

const r=140+Math.random()*50;

const x=
210+
16*Math.pow(Math.sin(angle),3)*8;

const y=
140-
(
13*Math.cos(angle)
-5*Math.cos(2*angle)
-2*Math.cos(3*angle)
-Math.cos(4*angle)
)*8;

h.style.left=x+'px';
h.style.top=y+'px';

h.innerHTML='❤';

canopy.appendChild(h);

}

const c=document.getElementById("stars");

const ctx=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}

resize();

window.addEventListener('resize',resize);

let stars=[];

for(let i=0;i<300;i++){

stars.push({
x:Math.random()*window.innerWidth,
y:Math.random()*window.innerHeight,
r:Math.random()*2
});

}

function draw(){

ctx.clearRect(0,0,c.width,c.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();

ctx.arc(s.x,s.y,s.r,0,6.28);

ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

 const fairy=document.getElementById("fairyLights");

const branchPoints=[
[42,28],[45,30],[48,31],[51,32],[54,34],
[36,36],[40,39],[44,42],[48,45],[52,43],
[58,40],[62,36],[39,49],[46,52],[54,51],
[60,48],[43,58],[49,60],[55,58]
];

branchPoints.forEach((p,i)=>{

let l=document.createElement("div");

l.className="light";

l.style.left=p[0]+"vw";

l.style.top=p[1]+"vh";

l.style.animationDelay=(Math.random()*2)+"s";

fairy.appendChild(l);

});

</script>

</body>
</html>
