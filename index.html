<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Babiii</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    font-family:Georgia, serif;
    background:
        radial-gradient(circle at top, rgba(255,215,0,0.12), transparent 25%),
        linear-gradient(to bottom, #090012, #1a001f 40%, #120000 100%);
    color:white;
}

/* Moon */
.moon{
    position:absolute;
    top:40px;
    right:60px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:radial-gradient(circle, #fff8dc, #f5d76e);
    box-shadow:0 0 40px #ffd700, 0 0 80px rgba(255,215,0,0.6);
    z-index:1;
}

/* Stars */
.stars{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:1;}
}

/* Title */
.title{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    z-index:5;
}

.title h1{
    font-size:3rem;
    color:#ffd700;
    text-shadow:0 0 10px #ff0000;
}

.title h2{
    margin-top:8px;
    color:#ffb6c1;
    font-size:1.5rem;
}

/* Tree container */
.tree-container{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Tree trunk */
.trunk{
    position:absolute;
    bottom:0;
    width:40px;
    height:220px;
    background:linear-gradient(to bottom, #5b3a1a, #2d1708);
    border-radius:20px;
    z-index:2;
}

/* Heart canopy */
.canopy{
    position:absolute;
    bottom:180px;
    width:420px;
    height:380px;
    z-index:3;
}

/* Individual heart */
.heart{
    position:absolute;
    width:22px;
    height:22px;
    transform:rotate(-45deg);
    animation:pulse 2s infinite ease-in-out;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:22px;
    height:22px;
    border-radius:50%;
}

.heart::before{
    top:-11px;
    left:0;
}

.heart::after{
    left:11px;
    top:0;
}

.red,
.red::before,
.red::after{
    background:#ff1744;
}

.pink,
.pink::before,
.pink::after{
    background:#ff4d88;
}

.gold,
.gold::before,
.gold::after{
    background:#ffd700;
}

@keyframes pulse{
    0%,100%{transform:rotate(-45deg) scale(1);}
    50%{transform:rotate(-45deg) scale(1.12);}
}

/* Crystal heart photo frame */
.crystal-heart{
    position:absolute;
    bottom:250px;
    width:170px;
    height:170px;
    transform:rotate(-45deg);
    border:5px solid rgba(255,255,255,0.9);
    border-radius:25px;
    overflow:hidden;
    box-shadow:
        0 0 25px rgba(255,255,255,0.9),
        0 0 50px rgba(255,215,0,0.8),
        inset 0 0 20px rgba(255,255,255,0.4);
    z-index:6;
    background:rgba(255,255,255,0.08);
}

.crystal-heart img{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:rotate(45deg) scale(1.45);
}

/* Floating hearts */
.float-heart{
    position:absolute;
    color:#ff4d6d;
    font-size:18px;
    animation:floatUp linear infinite;
    z-index:1;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    10%{
        opacity:1;
    }
    to{
        transform:translateY(-20vh);
        opacity:0;
    }
}

/* Bottom message */
.bottom{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:#ffd700;
    font-size:1.2rem;
    z-index:5;
}

@media(max-width:768px){
    .title h1{font-size:2.2rem;}
    .canopy{
        width:300px;
        height:280px;
        bottom:190px;
    }
    .crystal-heart{
        width:140px;
        height:140px;
        bottom:250px;
    }
}
body{
    background:#1b0018;
}

.heart-tree{
    position:relative;
    width:260px;
    height:220px;
    margin:100px auto;
}

.big-heart,
.small-heart{
    position:absolute;
}

.big-heart::before{
    content:"";
    position:absolute;
    width:180px;
    height:160px;
    left:30px;
    top:10px;
    filter:drop-shadow(0 0 12px #ff3366)
           drop-shadow(0 0 24px #ff0033);
}

.big-heart{
    width:240px;
    height:180px;
}

.small-heart{
    width:120px;
    height:100px;
    left:60px;
    top:55px;
}

.big-heart::after,
.small-heart::after{
    content:"";
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle,#ffb3c7 35%,transparent 37%);
    background-size:18px 18px;

    clip-path:path("M120 35
    C120 -10 180 -10 180 40
    C180 90 120 120 120 120
    C120 120 60 90 60 40
    C60 -10 120 -10 120 35Z");

    filter:
    drop-shadow(0 0 6px #ff4d88)
    drop-shadow(0 0 16px #ff004d);
}
    
</style>
</head>

<body>

<div class="moon"></div>
<div class="stars" id="stars"></div>

<div class="title">
    <h1>🎂 Happy Birthday Babiii 🎂</h1>
    <h2>I Love You ❤️ Forever & Always</h2>
</div>

<div class="heart-tree">
  <div class="big-heart"></div>
  <div class="small-heart"></div>
</div>

<div class="bottom">
    ✨ A love that grows forever like this magical tree ✨
</div>

<script>
// Create stars
const stars = document.getElementById('stars');
for(let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.animationDelay = Math.random()*2 + 's';
    stars.appendChild(s);
}

// Create heart-shaped canopy
const canopy = document.getElementById('canopy');

for(let t=0; t<Math.PI*2; t+=0.12){
    const x = 16*Math.pow(Math.sin(t),3);
    const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));

    const h = document.createElement('div');
    h.className = 'heart ' + ['red','pink','gold'][Math.floor(Math.random()*3)];

    h.style.left = (x*11 + 190) + 'px';
    h.style.top  = (y*11 + 120) + 'px';
    h.style.animationDelay = Math.random()*2 + 's';

    canopy.appendChild(h);
}

// Floating hearts animation
function createFloatingHeart(){
    const h = document.createElement('div');
    h.className = 'float-heart';
    h.innerHTML = '❤';
    h.style.left = Math.random()*100 + 'vw';
    h.style.animationDuration = (5 + Math.random()*5) + 's';
    h.style.fontSize = (14 + Math.random()*20) + 'px';
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),10000);
}

setInterval(createFloatingHeart, 300);
</script>

</body>
</html>
