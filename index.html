<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Babiii 🎂</title>
<style>
  /* ===================== RESET & BASE ===================== */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Georgia', serif;
    background: #000;
    overflow-x: hidden;
    color: #fff;
    cursor: default;
  }

  /* ===================== CUSTOM FONTS ===================== */
  @import url('data:text/css,');

  /* ===================== SKY CANVAS ===================== */
  #sky-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ===================== PARTICLE CANVAS ===================== */
  #particle-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* ===================== MAIN WRAPPER ===================== */
  #app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
  }

  /* ===================== HEADER ===================== */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 40px;
    position: relative;
  }

  .header-title {
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: bold;
    text-align: center;
    background: linear-gradient(135deg, #FFD700 0%, #FF8C00 25%, #FFD700 50%, #FFA500 75%, #FFD700 100%);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: goldShimmer 3s ease-in-out infinite, fadeInDown 1.5s ease forwards;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.8));
    letter-spacing: 2px;
    margin-bottom: 10px;
    opacity: 0;
  }

  .header-subtitle {
    font-size: clamp(1.5rem, 4vw, 2.8rem);
    text-align: center;
    color: #ff6b8a;
    animation: pulseGlow 2s ease-in-out infinite, fadeInUp 1.5s 0.5s ease forwards;
    opacity: 0;
    text-shadow: 0 0 20px rgba(255,107,138,0.8), 0 0 40px rgba(255,107,138,0.4);
    margin-bottom: 20px;
    letter-spacing: 3px;
  }

  @keyframes goldShimmer {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes pulseGlow {
    0%,100% { text-shadow: 0 0 20px rgba(255,107,138,0.8), 0 0 40px rgba(255,107,138,0.4); }
    50% { text-shadow: 0 0 40px rgba(255,107,138,1), 0 0 80px rgba(255,107,138,0.8), 0 0 120px rgba(255,107,138,0.4); }
  }
  @keyframes fadeInDown {
    from { opacity:0; transform: translateY(-40px); }
    to { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity:0; transform: translateY(40px); }
    to { opacity:1; transform: translateY(0); }
  }

  /* ===================== TREE SCENE ===================== */
  #tree-scene {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  #tree-canvas {
    display: block;
    width: 100%;
    max-width: 900px;
    height: 620px;
  }

  /* ===================== CRYSTAL HEART ===================== */
  #crystal-heart-wrap {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    z-index: 10;
    animation: heartSway 4s ease-in-out infinite;
  }

  @keyframes heartSway {
    0%,100% { transform: translateX(-50%) rotate(-2deg); }
    50% { transform: translateX(-50%) rotate(2deg); }
  }

  .pendant-string {
    width: 2px;
    height: 60px;
    background: linear-gradient(to bottom, rgba(255,215,0,0.8), rgba(255,215,0,0.3));
    box-shadow: 0 0 6px rgba(255,215,0,0.6);
  }

  .crystal-heart-container {
    position: relative;
    width: 140px;
    height: 130px;
    filter: drop-shadow(0 0 20px rgba(255,100,150,0.9)) drop-shadow(0 0 40px rgba(255,100,150,0.5));
    animation: crystalPulse 3s ease-in-out infinite;
  }

  @keyframes crystalPulse {
    0%,100% { filter: drop-shadow(0 0 20px rgba(255,100,150,0.9)) drop-shadow(0 0 40px rgba(255,100,150,0.5)); }
    50% { filter: drop-shadow(0 0 40px rgba(255,100,150,1)) drop-shadow(0 0 80px rgba(255,100,150,0.8)) drop-shadow(0 0 120px rgba(255,150,200,0.4)); }
  }

  .crystal-heart-svg {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
  }

  .heart-photo-clip {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    clip-path: url(#heartClip);
    overflow: hidden;
  }

  .heart-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  /* ===================== BLOOM OVERLAY ===================== */
  #bloom-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.5s;
  }

  /* ===================== FOREVER TEXT ===================== */
  #forever-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 200;
    font-size: clamp(2rem, 6vw, 4rem);
    color: #FFD700;
    text-shadow: 0 0 30px rgba(255,215,0,1), 0 0 60px rgba(255,100,150,0.8);
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: all 0.5s;
    letter-spacing: 2px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 30px 50px;
    border: 2px solid rgba(255,215,0,0.5);
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(255,215,0,0.3), inset 0 0 30px rgba(255,100,150,0.1);
  }

  /* ===================== LOVE LETTER ===================== */
  #letter-section {
    padding: 60px 20px;
    display: flex;
    justify-content: center;
    opacity: 0;
    transform: translateY(60px);
    transition: opacity 1s ease, transform 1s ease;
  }
  #letter-section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .letter-card {
    max-width: 760px;
    width: 100%;
    background: rgba(10, 0, 20, 0.75);
    backdrop-filter: blur(20px);
    border: 1px solid;
    border-image: linear-gradient(135deg, #FFD700, #8B0000, #FFD700, #C0392B) 1;
    border-radius: 20px;
    padding: 50px 50px;
    box-shadow:
      0 0 40px rgba(255,215,0,0.2),
      0 0 80px rgba(139,0,0,0.2),
      inset 0 0 60px rgba(255,215,0,0.05);
    position: relative;
    overflow: hidden;
  }

  .letter-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg,
      rgba(255,215,0,0.03) 0%,
      transparent 30%,
      rgba(139,0,0,0.05) 60%,
      transparent 80%,
      rgba(255,215,0,0.03) 100%);
    pointer-events: none;
  }

  .letter-card::after {
    content: '❤';
    position: absolute;
    top: 15px; right: 25px;
    font-size: 1.5rem;
    color: rgba(255,100,150,0.3);
  }

  .letter-title {
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    text-align: center;
    background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 30px;
    letter-spacing: 3px;
  }

  .letter-body {
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    line-height: 1.9;
    color: rgba(255,220,230,0.9);
    min-height: 200px;
  }

  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: #FFD700;
    animation: blink 0.7s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  @keyframes blink {
    0%,100% { opacity:1; }
    50% { opacity:0; }
  }

  /* ===================== MUSIC BUTTON ===================== */
  #music-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(20,0,30,0.9), rgba(60,0,30,0.9));
    border: 2px solid rgba(255,215,0,0.5);
    box-shadow: 0 0 20px rgba(255,215,0,0.3), 0 0 40px rgba(255,100,150,0.2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    z-index: 300;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }

  #music-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255,215,0,0.5), 0 0 60px rgba(255,100,150,0.4);
  }

  #music-btn.playing { animation: musicPulse 1s ease-in-out infinite; }

  @keyframes musicPulse {
    0%,100% { box-shadow: 0 0 20px rgba(255,215,0,0.3), 0 0 40px rgba(255,100,150,0.2); }
    50% { box-shadow: 0 0 40px rgba(255,215,0,0.7), 0 0 80px rgba(255,100,150,0.5); }
  }

  @keyframes crystalBurst {
    0%   { transform: scale(1);    filter: drop-shadow(0 0 20px rgba(255,100,150,0.9)); }
    25%  { transform: scale(1.35); filter: drop-shadow(0 0 60px rgba(255,215,0,1)) drop-shadow(0 0 120px rgba(255,100,150,1)); }
    50%  { transform: scale(0.9);  filter: drop-shadow(0 0 40px rgba(255,100,150,0.9)); }
    75%  { transform: scale(1.2);  filter: drop-shadow(0 0 50px rgba(255,215,0,0.9)) drop-shadow(0 0 100px rgba(255,100,150,0.8)); }
    100% { transform: scale(1);    filter: drop-shadow(0 0 20px rgba(255,100,150,0.9)); }
  }

  /* REPLACE the src below with your MP3 file path to enable background music */
  /* Example: <source src="birthday-song.mp3" type="audio/mpeg"> */

  /* ===================== FOOTER ===================== */
  #footer {
    padding: 60px 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 1s ease, transform 1s ease;
  }
  #footer.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .footer-text {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    background: linear-gradient(135deg, #FFD700, #FF6B8A, #FFD700);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: goldShimmer 3s ease-in-out infinite;
    letter-spacing: 4px;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
  }

  /* ===================== RESPONSIVE ===================== */
  @media (max-width: 600px) {
    #tree-canvas { height: 400px; }
    .crystal-heart-container { width: 100px; height: 93px; }
    .pendant-string { height: 40px; }
    .letter-card { padding: 30px 22px; }
    #crystal-heart-wrap { top: 30px; }
    #music-btn { bottom: 15px; right: 15px; width: 50px; height: 50px; font-size: 1.2rem; }
  }

  @media (min-width: 601px) and (max-width: 1024px) {
    #tree-canvas { height: 520px; }
  }

  /* ===================== FIREWORK CANVAS ===================== */
  #firework-canvas {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index: 150;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- ============ AUDIO (replace src with your MP3) ============ -->
<!--
  MUSIC: To enable background music, uncomment the audio element below
  and replace "YOUR_SONG.mp3" with the path to your MP3 file.
-->
<!--
<audio id="bg-music" loop>
  <source src="YOUR_SONG.mp3" type="audio/mpeg">
</audio>
-->

<!-- ============ SVG DEFS for heart clip ============ -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
      <path d="M0.5,0.9 C0.5,0.9 0.0,0.55 0.0,0.32 C0.0,0.13 0.13,0.0 0.28,0.0 C0.37,0.0 0.45,0.06 0.5,0.14 C0.55,0.06 0.63,0.0 0.72,0.0 C0.87,0.0 1.0,0.13 1.0,0.32 C1.0,0.55 0.5,0.9 0.5,0.9 Z"/>
    </clipPath>
  </defs>
</svg>

<!-- ============ CANVASES ============ -->
<canvas id="sky-canvas"></canvas>
<canvas id="particle-canvas"></canvas>
<canvas id="firework-canvas"></canvas>

<!-- ============ BLOOM OVERLAY ============ -->
<div id="bloom-overlay"></div>

<!-- ============ FOREVER TEXT ============ -->
<div id="forever-text">❤️ Forever &amp; Always ❤️</div>

<!-- ============ APP ============ -->
<div id="app">

  <!-- HERO -->
  <section id="hero">
    <h1 class="header-title">Happy Birthday Babiii 🎂</h1>
    <h2 class="header-subtitle">I Love You ❤️</h2>

    <div id="tree-scene">
      <canvas id="tree-canvas"></canvas>

      <!-- CRYSTAL HEART PENDANT -->
      <div id="crystal-heart-wrap">
        <div class="pendant-string"></div>
        <div class="crystal-heart-container">
          <!-- The photo fills the heart shape -->
          <div class="heart-photo-clip">
            <img class="heart-photo" src="IMG_6670.jpeg" alt="My Love" onerror="this.style.display='none'">
          </div>
          <!-- Crystal overlay -->
          <svg class="crystal-heart-svg" viewBox="0 0 140 130" xmlns="http://www.w3.org/2000/svg">
            <!-- Heart shape with crystal effect -->
            <defs>
              <radialGradient id="crystalGrad" cx="50%" cy="40%" r="60%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
                <stop offset="40%" stop-color="rgba(255,150,200,0.2)"/>
                <stop offset="100%" stop-color="rgba(180,0,80,0.4)"/>
              </radialGradient>
              <filter id="crystalBlur">
                <feGaussianBlur stdDeviation="1"/>
              </filter>
              <linearGradient id="shimmer1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/>
                <stop offset="50%" stop-color="rgba(255,200,220,0.1)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0.6)"/>
              </linearGradient>
            </defs>
            <!-- Main heart border glow -->
            <path d="M70,115 C70,115 5,72 5,42 C5,20 18,5 35,5 C48,5 59,13 70,26 C81,13 92,5 105,5 C122,5 135,20 135,42 C135,72 70,115 70,115 Z"
              fill="url(#crystalGrad)"
              stroke="rgba(255,215,0,0.7)"
              stroke-width="2"
            />
            <!-- Crystal facets -->
            <path d="M70,115 L5,42 L35,5 Z" fill="rgba(255,255,255,0.06)"/>
            <path d="M70,115 L135,42 L105,5 Z" fill="rgba(255,255,255,0.04)"/>
            <path d="M70,26 L35,5 L105,5 Z" fill="rgba(255,255,255,0.1)"/>
            <!-- Shimmer highlight -->
            <path d="M40,12 C55,8 62,15 65,22" stroke="rgba(255,255,255,0.9)" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M45,20 C52,17 57,21 59,26" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <!-- Glow border -->
            <path d="M70,115 C70,115 5,72 5,42 C5,20 18,5 35,5 C48,5 59,13 70,26 C81,13 92,5 105,5 C122,5 135,20 135,42 C135,72 70,115 70,115 Z"
              fill="none"
              stroke="rgba(255,200,220,0.4)"
              stroke-width="4"
              filter="url(#crystalBlur)"
            />
          </svg>
        </div>
      </div>
    </div>
  </section>

  <!-- LOVE LETTER -->
  <section id="letter-section">
    <div class="letter-card">
      <h3 class="letter-title">~ A Letter From My Heart ~</h3>
      <div class="letter-body" id="letter-text"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer id="footer">
    <p class="footer-text">Forever Yours ❤️</p>
  </footer>

</div>

<!-- ============ MUSIC BUTTON ============ -->
<button id="music-btn" onclick="toggleMusic()" title="Toggle Music">🎵</button>

<script>
/* ========================================================
   SKY & BACKGROUND
   ======================================================== */
const skyCanvas = document.getElementById('sky-canvas');
const skyCtx = skyCanvas.getContext('2d');

let W, H;
function resize() {
  W = skyCanvas.width = window.innerWidth;
  H = skyCanvas.height = window.innerHeight;
  particleCanvas.width = W;
  particleCanvas.height = H;
  fireworkCanvas.width = W;
  fireworkCanvas.height = H;
}
window.addEventListener('resize', resize);

// Stars
const stars = [];
for (let i = 0; i < 280; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random() * 0.75,
    r: Math.random() * 1.8 + 0.3,
    alpha: Math.random(),
    speed: Math.random() * 0.015 + 0.005,
    phase: Math.random() * Math.PI * 2
  });
}

// Clouds
const clouds = [];
for (let i = 0; i < 6; i++) {
  clouds.push({
    x: Math.random() * 1.5 - 0.25,
    y: 0.05 + Math.random() * 0.3,
    w: 0.15 + Math.random() * 0.2,
    h: 0.04 + Math.random() * 0.06,
    speed: (Math.random() * 0.00008 + 0.00003) * (Math.random() > 0.5 ? 1 : -1),
    alpha: 0.08 + Math.random() * 0.1
  });
}

// Moon
const moon = { x: 0.75, y: 0.12, r: 0.065, glow: 0, glowPhase: 0 };

let skyTime = 0;

function drawSky(moonBright) {
  skyTime += 0.008;

  // Night sky gradient
  const grad = skyCtx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#000005');
  grad.addColorStop(0.3, '#0a0015');
  grad.addColorStop(0.6, '#15001a');
  grad.addColorStop(1, '#200010');
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    s.phase += s.speed;
    const a = (Math.sin(s.phase) * 0.5 + 0.5) * 0.85 + 0.15;
    skyCtx.beginPath();
    skyCtx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    skyCtx.fillStyle = `rgba(255,240,255,${a})`;
    skyCtx.fill();
  });

  // Moon glow
  moon.glowPhase += 0.02;
  const mglow = moonBright ? 1 : (Math.sin(moon.glowPhase) * 0.15 + 0.85);
  const mr = moon.r * W;
  const mx = moon.x * W;
  const my = moon.y * H;

  // Outer glow layers
  for (let i = 5; i >= 1; i--) {
    const moonGrad = skyCtx.createRadialGradient(mx, my, mr * 0.5, mx, my, mr * (1 + i * 0.7));
    moonGrad.addColorStop(0, `rgba(255,240,200,${0.12 * mglow * (moonBright ? 2 : 1) / i})`);
    moonGrad.addColorStop(1, 'rgba(255,220,180,0)');
    skyCtx.beginPath();
    skyCtx.arc(mx, my, mr * (1 + i * 0.7), 0, Math.PI * 2);
    skyCtx.fillStyle = moonGrad;
    skyCtx.fill();
  }

  // Moon body
  const moonBody = skyCtx.createRadialGradient(mx - mr * 0.2, my - mr * 0.2, mr * 0.1, mx, my, mr);
  moonBody.addColorStop(0, `rgba(255,255,240,${mglow})`);
  moonBody.addColorStop(0.6, `rgba(255,240,200,${0.95 * mglow})`);
  moonBody.addColorStop(1, `rgba(240,220,160,${0.85 * mglow})`);
  skyCtx.beginPath();
  skyCtx.arc(mx, my, mr, 0, Math.PI * 2);
  skyCtx.fillStyle = moonBody;
  skyCtx.fill();

  // Clouds
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > 1.3) c.x = -0.3;
    if (c.x < -0.3) c.x = 1.3;
    const cx = c.x * W, cy = c.y * H, cw = c.w * W, ch = c.h * H;
    const cloudGrad = skyCtx.createRadialGradient(cx, cy, ch * 0.1, cx, cy, cw * 0.6);
    cloudGrad.addColorStop(0, `rgba(200,160,220,${c.alpha})`);
    cloudGrad.addColorStop(1, 'rgba(100,50,120,0)');
    skyCtx.beginPath();
    skyCtx.ellipse(cx, cy, cw * 0.6, ch, 0, 0, Math.PI * 2);
    skyCtx.fillStyle = cloudGrad;
    skyCtx.fill();
  });

  // Fog at bottom
  const fog = skyCtx.createLinearGradient(0, H * 0.75, 0, H);
  fog.addColorStop(0, 'rgba(80,0,40,0)');
  fog.addColorStop(0.5, 'rgba(60,0,30,0.15)');
  fog.addColorStop(1, 'rgba(30,0,15,0.35)');
  skyCtx.fillStyle = fog;
  skyCtx.fillRect(0, H * 0.75, W, H * 0.25);
}

/* ========================================================
   TREE DRAWING
   ======================================================== */
const treeCanvas = document.getElementById('tree-canvas');
const treeCtx = treeCanvas.getContext('2d');

let treeW, treeH;
let heartLeaves = [];
let fairyLights = [];
let treeBloom = false;
let bloomHearts = [];

function setupTree() {
  treeW = treeCanvas.offsetWidth;
  treeH = treeCanvas.offsetHeight;
  treeCanvas.width = treeW;
  treeCanvas.height = treeH;
  generateHeartLeaves();
  generateFairyLights();
}

function heartPath(ctx, x, y, size) {
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.3);
  ctx.bezierCurveTo(x, y, x - size * 0.5, y - size * 0.3, x - size * 0.5, y - size * 0.6);
  ctx.bezierCurveTo(x - size * 0.5, y - size * 1.1, x, y - size * 0.9, x, y - size * 0.6);
  ctx.bezierCurveTo(x, y - size * 0.9, x + size * 0.5, y - size * 1.1, x + size * 0.5, y - size * 0.6);
  ctx.bezierCurveTo(x + size * 0.5, y - size * 0.3, x, y, x, y + size * 0.3);
  ctx.closePath();
}

function generateHeartLeaves() {
  heartLeaves = [];
  const cx = treeW / 2;
  const canopyBottom = treeH * 0.52;
  const canopyR = treeW * 0.42;
  const canopyTop = treeH * 0.02;
  const count = 380;

  for (let i = 0; i < count; i++) {
    // Heart-shaped distribution
    let px, py, inside = false;
    let attempts = 0;
    while (!inside && attempts < 200) {
      const t = Math.random() * Math.PI * 2;
      const r = Math.random();
      // Parametric heart
      const hx = 16 * Math.pow(Math.sin(t), 3) * r;
      const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r;
      // Scale to canvas
      px = cx + hx * (canopyR / 18);
      py = canopyBottom - (canopyBottom - canopyTop) * 0.5 + hy * (canopyR / 18);
      if (py > canopyTop && py < canopyBottom && px > cx - canopyR && px < cx + canopyR) {
        inside = true;
      }
      attempts++;
    }
    if (!inside) {
      px = cx + (Math.random() - 0.5) * canopyR;
      py = canopyTop + Math.random() * (canopyBottom - canopyTop) * 0.7;
    }

    const colors = [
      '#ff2244', '#ff4466', '#cc0033', '#ff0055',
      '#ff6688', '#dd0044', '#ff3355', '#aa0033',
      '#ff8899', '#ff1144'
    ];
    heartLeaves.push({
      x: px, y: py,
      size: 5 + Math.random() * 9,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: 0.7 + Math.random() * 0.3,
      glowPhase: Math.random() * Math.PI * 2,
      glowSpeed: 0.02 + Math.random() * 0.03,
      sway: Math.random() * Math.PI * 2,
      swaySpeed: 0.008 + Math.random() * 0.012,
      swayAmp: 1 + Math.random() * 2,
      rot: (Math.random() - 0.5) * 0.4
    });
  }
}

function generateFairyLights() {
  fairyLights = [];
  const cx = treeW / 2;
  const trunkTop = treeH * 0.52;

  // Generate lights along branch-like paths
  const branches = [
    {sx: cx, sy: trunkTop, ex: cx - treeW*0.35, ey: treeH*0.2, count: 20},
    {sx: cx, sy: trunkTop, ex: cx + treeW*0.35, ey: treeH*0.2, count: 20},
    {sx: cx, sy: trunkTop, ex: cx - treeW*0.2, ey: treeH*0.08, count: 18},
    {sx: cx, sy: trunkTop, ex: cx + treeW*0.2, ey: treeH*0.08, count: 18},
    {sx: cx, sy: trunkTop, ex: cx, ey: treeH*0.04, count: 15},
    {sx: cx, sy: trunkTop * 1.15, ex: cx - treeW*0.45, ey: treeH*0.38, count: 16},
    {sx: cx, sy: trunkTop * 1.15, ex: cx + treeW*0.45, ey: treeH*0.38, count: 16},
  ];

  branches.forEach(b => {
    for (let i = 0; i < b.count; i++) {
      const t = i / b.count + (Math.random() - 0.5) * 0.1;
      fairyLights.push({
        x: b.sx + (b.ex - b.sx) * t + (Math.random() - 0.5) * treeW * 0.03,
        y: b.sy + (b.ey - b.sy) * t + (Math.random() - 0.5) * treeH * 0.02,
        r: 2 + Math.random() * 3,
        phase: Math.random() * Math.PI * 2,
        speed: 0.04 + Math.random() * 0.06,
        color: Math.random() > 0.5 ? '#FFD700' : (Math.random() > 0.5 ? '#FFF0AA' : '#FFEC8B')
      });
    }
  });
}

function drawTrunk(ctx, cx, baseY, topY) {
  // Main trunk with realistic bark
  const trunkW = treeW * 0.045;
  const trunkGrad = ctx.createLinearGradient(cx - trunkW, 0, cx + trunkW, 0);
  trunkGrad.addColorStop(0, '#1a0800');
  trunkGrad.addColorStop(0.25, '#3d1a08');
  trunkGrad.addColorStop(0.5, '#5c2d0e');
  trunkGrad.addColorStop(0.75, '#3d1a08');
  trunkGrad.addColorStop(1, '#1a0800');

  // Trunk shape (slightly curved)
  ctx.beginPath();
  ctx.moveTo(cx - trunkW * 1.8, baseY);
  ctx.quadraticCurveTo(cx - trunkW * 0.5, baseY * 0.75 + topY * 0.25, cx - trunkW * 0.6, topY);
  ctx.lineTo(cx + trunkW * 0.6, topY);
  ctx.quadraticCurveTo(cx + trunkW * 0.5, baseY * 0.75 + topY * 0.25, cx + trunkW * 1.8, baseY);
  ctx.closePath();
  ctx.fillStyle = trunkGrad;
  ctx.fill();

  // Bark texture lines
  for (let i = 0; i < 18; i++) {
    const ty = topY + (baseY - topY) * (i / 18);
    const w = trunkW * (0.7 + 0.3 * (i / 18)) * 1.6;
    ctx.beginPath();
    ctx.moveTo(cx - w * (0.3 + Math.random() * 0.4), ty);
    ctx.quadraticCurveTo(
      cx + (Math.random() - 0.5) * w * 0.3, ty + (baseY - topY) * 0.04,
      cx + w * (0.3 + Math.random() * 0.3), ty + (baseY - topY) * 0.06
    );
    ctx.strokeStyle = `rgba(${Math.random() > 0.5 ? '10,3,0' : '80,35,5'},${0.4 + Math.random() * 0.3})`;
    ctx.lineWidth = 0.8 + Math.random();
    ctx.stroke();
  }

  // Roots
  const roots = [
    {dx: -0.4, dy: 0.06, sweep: -0.3},
    {dx: -0.25, dy: 0.08, sweep: -0.15},
    {dx: 0.25, dy: 0.08, sweep: 0.15},
    {dx: 0.4, dy: 0.06, sweep: 0.3},
  ];
  roots.forEach(r => {
    ctx.beginPath();
    ctx.moveTo(cx + trunkW * r.sweep * 2, baseY - treeH * 0.01);
    ctx.quadraticCurveTo(
      cx + treeW * r.dx * 0.5, baseY + treeH * r.dy * 0.5,
      cx + treeW * r.dx, baseY + treeH * r.dy
    );
    ctx.strokeStyle = `rgba(40,15,3,0.7)`;
    ctx.lineWidth = trunkW * (0.3 - Math.abs(r.dx) * 0.1);
    ctx.stroke();
  });

  // Branches
  drawBranches(ctx, cx, topY, trunkW);
}

function drawBranches(ctx, cx, topY, trunkW) {
  const branchDefs = [
    {startY: 0.0, endX: -0.38, endY: -0.22, w: 0.55},
    {startY: 0.0, endX:  0.38, endY: -0.22, w: 0.55},
    {startY: 0.05, endX: -0.22, endY: -0.38, w: 0.4},
    {startY: 0.05, endX:  0.22, endY: -0.38, w: 0.4},
    {startY: 0.08, endX: 0,     endY: -0.45, w: 0.35},
    {startY: 0.15, endX: -0.45, endY: -0.08, w: 0.45},
    {startY: 0.15, endX:  0.45, endY: -0.08, w: 0.45},
    // Sub-branches
    {startY: 0.0, endX: -0.28, endY: -0.40, w: 0.28},
    {startY: 0.0, endX:  0.28, endY: -0.40, w: 0.28},
  ];

  const len = treeH * 0.45;

  branchDefs.forEach(b => {
    const sx = cx, sy = topY + treeH * b.startY * 0.3;
    const ex = cx + treeW * b.endX;
    const ey = topY + b.endY * len;
    const mid = 0.5;
    const cpx = sx * (1-mid) + ex * mid + (b.endY < -0.3 ? treeW * b.endX * 0.1 : 0);
    const cpy = sy * (1-mid) + ey * mid;

    const bGrad = treeCtx.createLinearGradient(sx, sy, ex, ey);
    bGrad.addColorStop(0, '#3d1a08');
    bGrad.addColorStop(1, '#1a0a04');

    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo(cpx, cpy, ex, ey);
    ctx.strokeStyle = bGrad;
    ctx.lineWidth = trunkW * b.w;
    ctx.lineCap = 'round';
    ctx.stroke();
  });
}

let treeTime = 0;
function drawTree() {
  treeCtx.clearRect(0, 0, treeW, treeH);
  treeTime += 0.016;

  const cx = treeW / 2;
  const baseY = treeH * 0.98;
  const topY = treeH * 0.52;

  // Ground shadow
  const shadowGrad = treeCtx.createRadialGradient(cx, baseY, 5, cx, baseY, treeW * 0.4);
  shadowGrad.addColorStop(0, 'rgba(0,0,0,0.5)');
  shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  treeCtx.beginPath();
  treeCtx.ellipse(cx, baseY, treeW * 0.4, treeH * 0.04, 0, 0, Math.PI * 2);
  treeCtx.fillStyle = shadowGrad;
  treeCtx.fill();

  // Canopy glow
  const canopyGlow = treeCtx.createRadialGradient(cx, treeH * 0.28, 20, cx, treeH * 0.28, treeW * 0.5);
  canopyGlow.addColorStop(0, 'rgba(180,0,60,0.18)');
  canopyGlow.addColorStop(0.5, 'rgba(120,0,40,0.1)');
  canopyGlow.addColorStop(1, 'rgba(60,0,20,0)');
  treeCtx.beginPath();
  treeCtx.ellipse(cx, treeH * 0.28, treeW * 0.5, treeH * 0.35, 0, 0, Math.PI * 2);
  treeCtx.fillStyle = canopyGlow;
  treeCtx.fill();

  // Draw trunk and branches
  drawTrunk(treeCtx, cx, baseY, topY);

  // Heart leaves
  heartLeaves.forEach(leaf => {
    leaf.sway += leaf.swaySpeed;
    leaf.glowPhase += leaf.glowSpeed;
    const swayX = leaf.x + Math.sin(leaf.sway) * leaf.swayAmp;
    const swayY = leaf.y + Math.cos(leaf.sway * 0.7) * leaf.swayAmp * 0.4;
    const glow = Math.sin(leaf.glowPhase) * 0.3 + 0.7;
    const bloom = treeBloom ? 1.4 : 1;

    treeCtx.save();
    treeCtx.translate(swayX, swayY);
    treeCtx.rotate(leaf.rot + Math.sin(leaf.sway) * 0.05);

    // Glow
    treeCtx.shadowColor = leaf.color;
    treeCtx.shadowBlur = 8 * glow * bloom;

    // Heart
    heartPath(treeCtx, 0, 0, leaf.size * bloom);
    treeCtx.fillStyle = leaf.color.replace(')', `,${leaf.alpha * glow})`).replace('rgb', 'rgba');
    treeCtx.fill();
    // Highlight
    heartPath(treeCtx, -leaf.size * 0.1, -leaf.size * 0.15, leaf.size * 0.35 * bloom);
    treeCtx.fillStyle = `rgba(255,200,220,0.35)`;
    treeCtx.fill();

    treeCtx.restore();
  });

  // Fairy lights
  fairyLights.forEach(fl => {
    fl.phase += fl.speed;
    const a = Math.sin(fl.phase) * 0.4 + 0.6;
    const r = fl.r * (0.8 + a * 0.4);

    treeCtx.save();
    treeCtx.shadowColor = fl.color;
    treeCtx.shadowBlur = 12 * a;
    treeCtx.beginPath();
    treeCtx.arc(fl.x, fl.y, r, 0, Math.PI * 2);
    treeCtx.fillStyle = fl.color;
    treeCtx.globalAlpha = a;
    treeCtx.fill();
    treeCtx.restore();
  });

  // Bloom burst hearts
  if (treeBloom) {
    bloomHearts = bloomHearts.filter(h => h.life > 0);
    bloomHearts.forEach(h => {
      h.x += h.vx;
      h.y += h.vy;
      h.vy += 0.15;
      h.life -= 0.012;
      h.rot += h.rotSpeed;
      treeCtx.save();
      treeCtx.translate(h.x, h.y);
      treeCtx.rotate(h.rot);
      treeCtx.globalAlpha = h.life;
      treeCtx.shadowColor = h.color;
      treeCtx.shadowBlur = 15;
      heartPath(treeCtx, 0, 0, h.size);
      treeCtx.fillStyle = h.color;
      treeCtx.fill();
      treeCtx.restore();
    });
  }
}

/* ========================================================
   PARTICLES (floating hearts, petals, fireflies, bokeh)
   ======================================================== */
const particleCanvas = document.getElementById('particle-canvas');
const pCtx = particleCanvas.getContext('2d');

const particles = [];
const PARTICLE_TYPES = ['heart', 'petal', 'firefly', 'bokeh', 'sparkle', 'butterfly'];

function spawnParticle(type) {
  const base = {
    type,
    x: Math.random() * W,
    y: H + 30,
    alpha: 0,
    alphaTarget: 0.6 + Math.random() * 0.4,
    life: 1,
  };

  switch(type) {
    case 'heart':
      return {...base,
        size: 6 + Math.random() * 14,
        vx: (Math.random() - 0.5) * 1.2,
        vy: -(1.5 + Math.random() * 2),
        color: `hsl(${340 + Math.random() * 30},100%,${55 + Math.random() * 20}%)`,
        sway: Math.random() * Math.PI * 2,
        swaySpeed: 0.02 + Math.random() * 0.03
      };
    case 'petal':
      return {...base,
        size: 8 + Math.random() * 12,
        vx: (Math.random() - 0.5) * 1.5,
        vy: -(0.8 + Math.random() * 1.5),
        color: `hsl(${330 + Math.random() * 40},${80 + Math.random() * 20}%,${75 + Math.random() * 15}%)`,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.08,
        sway: Math.random() * Math.PI * 2
      };
    case 'firefly':
      return {...base,
        x: Math.random() * W,
        y: Math.random() * H * 0.8,
        size: 2 + Math.random() * 4,
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6,
        color: `hsl(${60 + Math.random() * 30},100%,${70 + Math.random() * 20}%)`,
        glowPhase: Math.random() * Math.PI * 2,
        glowSpeed: 0.05 + Math.random() * 0.1,
        life: 1, alphaTarget: 0.9
      };
    case 'bokeh':
      return {...base,
        x: Math.random() * W,
        y: Math.random() * H,
        size: 15 + Math.random() * 40,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -(0.2 + Math.random() * 0.5),
        color: `hsl(${Math.random() * 360},${60 + Math.random() * 40}%,${60 + Math.random() * 30}%)`,
        life: 1, alphaTarget: 0.06 + Math.random() * 0.08
      };
    case 'sparkle':
      return {...base,
        x: Math.random() * W,
        y: Math.random() * H,
        size: 2 + Math.random() * 5,
        vx: (Math.random() - 0.5) * 0.8,
        vy: -(0.5 + Math.random() * 1),
        color: `hsl(${45 + Math.random() * 20},100%,85%)`,
        life: 1, rot: Math.random() * Math.PI
      };
    case 'butterfly':
      return {...base,
        x: Math.random() * W,
        y: H * 0.3 + Math.random() * H * 0.5,
        size: 12 + Math.random() * 16,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 0.8,
        wingPhase: Math.random() * Math.PI * 2,
        wingSpeed: 0.12 + Math.random() * 0.1,
        color1: `hsl(${Math.random() * 60 + 300},90%,65%)`,
        color2: `hsl(${Math.random() * 60 + 20},90%,65%)`,
        life: 1, alphaTarget: 0.75
      };
  }
}

// Seed initial particles
for (let i = 0; i < 25; i++) particles.push(spawnParticle('heart'));
for (let i = 0; i < 30; i++) {
  const p = spawnParticle('petal');
  p.y = Math.random() * H;
  particles.push(p);
}
for (let i = 0; i < 40; i++) particles.push(spawnParticle('firefly'));
for (let i = 0; i < 20; i++) particles.push(spawnParticle('bokeh'));
for (let i = 0; i < 15; i++) particles.push(spawnParticle('sparkle'));
for (let i = 0; i < 8; i++) particles.push(spawnParticle('butterfly'));

let pTime = 0;
function drawParticles() {
  pCtx.clearRect(0, 0, W, H);
  pTime++;

  // Spawn new
  if (pTime % 12 === 0) particles.push(spawnParticle('heart'));
  if (pTime % 8 === 0) particles.push(spawnParticle('petal'));
  if (pTime % 30 === 0) particles.push(spawnParticle('sparkle'));
  if (pTime % 60 === 0) particles.push(spawnParticle('butterfly'));
  if (particles.length < 100 && pTime % 20 === 0) particles.push(spawnParticle('bokeh'));

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.alpha += (p.alphaTarget - p.alpha) * 0.05;

    switch(p.type) {
      case 'heart': {
        p.sway += p.swaySpeed;
        p.x += p.vx + Math.sin(p.sway) * 0.8;
        p.y += p.vy;
        pCtx.save();
        pCtx.translate(p.x, p.y);
        pCtx.globalAlpha = p.alpha;
        pCtx.shadowColor = p.color;
        pCtx.shadowBlur = 8;
        heartPath(pCtx, 0, 0, p.size);
        pCtx.fillStyle = p.color;
        pCtx.fill();
        pCtx.restore();
        if (p.y < -50) particles.splice(i, 1);
        break;
      }
      case 'petal': {
        p.sway = (p.sway || 0) + 0.025;
        p.rot += p.rotSpeed;
        p.x += p.vx + Math.sin(p.sway) * 1.2;
        p.y += p.vy;
        pCtx.save();
        pCtx.translate(p.x, p.y);
        pCtx.rotate(p.rot);
        pCtx.globalAlpha = p.alpha * 0.85;
        pCtx.beginPath();
        pCtx.ellipse(0, 0, p.size * 0.4, p.size * 0.7, 0, 0, Math.PI * 2);
        pCtx.fillStyle = p.color;
        pCtx.fill();
        pCtx.restore();
        if (p.y < -60) particles.splice(i, 1);
        break;
      }
      case 'firefly': {
        p.glowPhase += p.glowSpeed;
        const fa = Math.sin(p.glowPhase) * 0.5 + 0.5;
        p.x += p.vx + Math.sin(p.glowPhase * 0.3) * 0.5;
        p.y += p.vy + Math.cos(p.glowPhase * 0.4) * 0.4;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H * 0.85) p.vy *= -1;
        pCtx.save();
        pCtx.globalAlpha = fa * p.alpha;
        pCtx.shadowColor = p.color;
        pCtx.shadowBlur = 15 * fa;
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        pCtx.fillStyle = p.color;
        pCtx.fill();
        pCtx.restore();
        break;
      }
      case 'bokeh': {
        p.x += p.vx;
        p.y += p.vy;
        pCtx.save();
        pCtx.globalAlpha = p.alpha;
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        const bokehGrad = pCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
        bokehGrad.addColorStop(0, p.color.replace(')', ', 0.2)').replace('hsl', 'hsla'));
        bokehGrad.addColorStop(0.6, p.color.replace(')', ', 0.08)').replace('hsl', 'hsla'));
        bokehGrad.addColorStop(1, 'rgba(0,0,0,0)');
        pCtx.fillStyle = bokehGrad;
        pCtx.fill();
        pCtx.restore();
        if (p.y < -p.size) particles.splice(i, 1);
        break;
      }
      case 'sparkle': {
        p.x += p.vx;
        p.y += p.vy;
        p.rot = (p.rot || 0) + 0.1;
        pCtx.save();
        pCtx.translate(p.x, p.y);
        pCtx.rotate(p.rot);
        pCtx.globalAlpha = p.alpha;
        pCtx.shadowColor = p.color;
        pCtx.shadowBlur = 10;
        // 4-pointed star
        for (let j = 0; j < 4; j++) {
          pCtx.beginPath();
          pCtx.moveTo(0, 0);
          pCtx.lineTo(Math.cos(j * Math.PI / 2) * p.size * 2, Math.sin(j * Math.PI / 2) * p.size * 2);
          pCtx.strokeStyle = p.color;
          pCtx.lineWidth = 1.5;
          pCtx.stroke();
        }
        pCtx.restore();
        if (p.y < -30) particles.splice(i, 1);
        break;
      }
      case 'butterfly': {
        p.wingPhase += p.wingSpeed;
        p.x += p.vx;
        p.y += p.vy + Math.sin(p.wingPhase * 0.4) * 0.3;
        if (p.x < -50) p.vx = Math.abs(p.vx);
        if (p.x > W + 50) p.vx = -Math.abs(p.vx);
        if (p.y < H * 0.1 || p.y > H * 0.9) p.vy *= -1;

        const wing = Math.abs(Math.sin(p.wingPhase)) * p.size;
        pCtx.save();
        pCtx.translate(p.x, p.y);
        pCtx.globalAlpha = p.alpha;
        // Left wing
        pCtx.beginPath();
        pCtx.ellipse(-wing * 0.5, 0, wing, p.size * 0.55, -0.3, 0, Math.PI * 2);
        pCtx.fillStyle = p.color1.replace('hsl', 'hsla').replace(')', ',0.75)');
        pCtx.fill();
        // Right wing
        pCtx.beginPath();
        pCtx.ellipse(wing * 0.5, 0, wing, p.size * 0.55, 0.3, 0, Math.PI * 2);
        pCtx.fillStyle = p.color2.replace('hsl', 'hsla').replace(')', ',0.75)');
        pCtx.fill();
        // Body
        pCtx.beginPath();
        pCtx.ellipse(0, 0, 2, p.size * 0.4, 0, 0, Math.PI * 2);
        pCtx.fillStyle = 'rgba(80,20,40,0.9)';
        pCtx.fill();
        pCtx.restore();
        break;
      }
    }
  }
}

const fireworkCanvas = document.getElementById('firework-canvas');
const fCtx = fireworkCanvas.getContext('2d');

let fireworks = [];
let goldenParticlesArr = [];

function launchFirework(x, y) {
  const colors = ['#FFD700','#FF4500','#FF1493','#FF6347','#FFF0AA','#FF69B4','#FFB6C1','#FFDAB9','#C0392B'];
  const count = 60 + Math.floor(Math.random() * 40);
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const speed = 3 + Math.random() * 6;
    fireworks.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: 1,
      size: 2 + Math.random() * 3,
      tail: [],
      gravity: 0.12
    });
  }
}

function spawnGoldenParticle(cx, cy) {
  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 8;
    goldenParticlesArr.push({
      x: cx + (Math.random() - 0.5) * 200,
      y: cy + (Math.random() - 0.5) * 200,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      alpha: 1,
      size: 1.5 + Math.random() * 4,
      color: Math.random() > 0.5 ? '#FFD700' : '#FFA500',
      gravity: 0.08
    });
  }
}

let fTime = 0;
function drawFireworks() {
  fCtx.clearRect(0, 0, W, H);

  for (let i = fireworks.length - 1; i >= 0; i--) {
    const f = fireworks[i];
    f.tail.push({x: f.x, y: f.y});
    if (f.tail.length > 5) f.tail.shift();
    f.x += f.vx;
    f.y += f.vy;
    f.vy += f.gravity;
    f.vx *= 0.98;
    f.alpha -= 0.018;
    if (f.alpha <= 0) { fireworks.splice(i, 1); continue; }
    fCtx.save();
    fCtx.globalAlpha = f.alpha;
    fCtx.shadowColor = f.color;
    fCtx.shadowBlur = 8;
    fCtx.beginPath();
    fCtx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    fCtx.fillStyle = f.color;
    fCtx.fill();
    // Tail
    if (f.tail.length > 1) {
      fCtx.beginPath();
      fCtx.moveTo(f.tail[0].x, f.tail[0].y);
      f.tail.forEach(t => fCtx.lineTo(t.x, t.y));
      fCtx.strokeStyle = f.color;
      fCtx.lineWidth = 1.5;
      fCtx.globalAlpha = f.alpha * 0.4;
      fCtx.stroke();
    }
    fCtx.restore();
  }

  for (let i = goldenParticlesArr.length - 1; i >= 0; i--) {
    const g = goldenParticlesArr[i];
    g.x += g.vx;
    g.y += g.vy;
    g.vy += g.gravity;
    g.vx *= 0.97;
    g.alpha -= 0.015;
    if (g.alpha <= 0) { goldenParticlesArr.splice(i, 1); continue; }
    fCtx.save();
    fCtx.globalAlpha = g.alpha;
    fCtx.shadowColor = g.color;
    fCtx.shadowBlur = 10;
    fCtx.beginPath();
    fCtx.arc(g.x, g.y, g.size, 0, Math.PI * 2);
    fCtx.fillStyle = g.color;
    fCtx.fill();
    fCtx.restore();
  }
}

/* ========================================================
   BLOOM STATE
   ======================================================== */
let bloomActive = false;
let bloomTimer = null;

/* ========================================================
   MUSIC
   ======================================================== */
let musicPlaying = false;
function toggleMusic() {
  const audio = document.getElementById('bg-music');
  const btn = document.getElementById('music-btn');
  if (!audio) {
    // No audio element — show note
    btn.title = 'Add your MP3 file to enable music';
    btn.textContent = '🎵';
    return;
  }
  if (musicPlaying) {
    audio.pause();
    musicPlaying = false;
    btn.textContent = '🎵';
    btn.classList.remove('playing');
  } else {
    audio.play().catch(() => {});
    musicPlaying = true;
    btn.textContent = '⏸';
    btn.classList.add('playing');
  }
}

/* ========================================================
   LOVE LETTER TYPEWRITER
   ======================================================== */
const letterText = `My dearest Babiii,

With all my heart, always 💕`;

let typeIndex = 0;
let letterStarted = false;

function startTypewriter() {
  if (letterStarted) return;
  letterStarted = true;
  const el = document.getElementById('letter-text');
  el.innerHTML = '<span class="cursor-blink"></span>';

  function typeNext() {
    if (typeIndex >= letterText.length) {
      el.innerHTML = letterText.replace(/\n/g, '<br>');
      return;
    }
    const char = letterText[typeIndex];
    typeIndex++;
    const cursor = el.querySelector('.cursor-blink');
    if (cursor) {
      cursor.insertAdjacentText('beforebegin', char === '\n' ? '' : char);
      if (char === '\n') cursor.insertAdjacentHTML('beforebegin', '<br>');
    }
    const delay = char === '.' || char === ',' || char === '!' || char === '?' ? 60 :
                  char === '\n' ? 80 : 25 + Math.random() * 15;
    setTimeout(typeNext, delay);
  }
  typeNext();
}

/* ========================================================
   SCROLL OBSERVER
   ======================================================== */
function setupScrollObserver() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        if (e.target.id === 'letter-section') startTypewriter();
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('#letter-section, #footer').forEach(el => obs.observe(el));
}

/* ========================================================
   PARALLAX (mouse + scroll)
   ======================================================== */
let parallaxX = 0, parallaxY = 0;
let targetPX = 0, targetPY = 0;
let scrollY = 0;

window.addEventListener('mousemove', e => {
  targetPX = (e.clientX / window.innerWidth  - 0.5) * 2;
  targetPY = (e.clientY / window.innerHeight - 0.5) * 2;
});

window.addEventListener('scroll', () => { scrollY = window.scrollY; }, { passive: true });

// Parallax applied as CSS transforms on layered elements
const heroSection = document.getElementById('hero');

function applyParallax() {
  parallaxX += (targetPX - parallaxX) * 0.04;
  parallaxY += (targetPY - parallaxY) * 0.04;

  // Stars layer (sky canvas) — subtle mouse drift
  skyCanvas.style.transform = `translate(${parallaxX * -8}px, ${parallaxY * -8}px) scale(1.04)`;

  // Particle canvas — medium depth
  particleCanvas.style.transform = `translate(${parallaxX * 5}px, ${parallaxY * 5}px)`;

  // Tree scene — gentle mouse + scroll depth (foreground)
  const treeScene = document.getElementById('tree-scene');
  treeScene.style.transform = `translate(${parallaxX * 12}px, ${parallaxY * 8 - scrollY * 0.08}px)`;

  // Crystal heart — scroll-based gentle bob
  const heartWrap = document.getElementById('crystal-heart-wrap');
  const baseTop = window.innerWidth < 600 ? 30 : 50;
  heartWrap.style.top = `${baseTop - scrollY * 0.02}px`;
}

/* ========================================================
   MAIN ANIMATION LOOP
   ======================================================== */
let moonBrighter = false;

function loop() {
  applyParallax();
  drawSky(moonBrighter);
  drawParticles();
  drawTree();
  drawFireworks();
  requestAnimationFrame(loop);
}

/* ========================================================
   BLOOM EFFECT (single consolidated handler)
   ======================================================== */
function triggerBloom() {
  if (bloomActive) return;
  bloomActive = true;
  treeBloom = true;
  moonBrighter = true;

  // Crystal heart pulse animation
  const heartContainer = document.querySelector('.crystal-heart-container');
  heartContainer.style.animation = 'crystalBurst 0.6s ease-in-out 4, crystalPulse 3s 2.4s ease-in-out infinite';

  // Bloom overlay flash
  const overlay = document.getElementById('bloom-overlay');
  overlay.style.background = 'radial-gradient(ellipse at center, rgba(255,100,150,0.35) 0%, rgba(255,50,80,0.15) 40%, rgba(80,0,30,0.08) 70%, transparent 100%)';
  overlay.style.opacity = '1';
  setTimeout(() => { overlay.style.opacity = '0'; }, 800);

  // Burst hearts from canopy
  for (let i = 0; i < 120; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 8;
    const colors = ['#ff2244','#ff4466','#FFD700','#ff6688','#ff0055','#FFA500'];
    bloomHearts.push({
      x: treeW / 2 + (Math.random() - 0.5) * treeW * 0.5,
      y: treeH * 0.3 + (Math.random() - 0.5) * treeH * 0.2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 4,
      size: 8 + Math.random() * 16,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.1
    });
  }

  // Fireworks
  const positions = [
    [W * 0.2, H * 0.25], [W * 0.8, H * 0.25], [W * 0.5, H * 0.15],
    [W * 0.35, H * 0.4], [W * 0.65, H * 0.4], [W * 0.1, H * 0.5], [W * 0.9, H * 0.5]
  ];
  positions.forEach((pos, idx) => setTimeout(() => launchFirework(pos[0], pos[1]), idx * 200));
  for (let i = 0; i < 6; i++) {
    setTimeout(() => launchFirework(Math.random() * W, Math.random() * H * 0.6), 1500 + i * 300);
  }

  // Golden particles from heart position
  const heartEl = document.getElementById('crystal-heart-wrap');
  const heartRect = heartEl.getBoundingClientRect();
  spawnGoldenParticle(heartRect.left + heartRect.width / 2, heartRect.top + heartRect.height / 2);

  // "Forever & Always" reveal
  const foreverEl = document.getElementById('forever-text');
  foreverEl.style.opacity = '1';
  foreverEl.style.transform = 'translate(-50%, -50%) scale(1)';

  // Reset after 5 seconds
  if (bloomTimer) clearTimeout(bloomTimer);
  bloomTimer = setTimeout(() => {
    treeBloom = false;
    bloomActive = false;
    moonBrighter = false;
    bloomHearts = [];
    foreverEl.style.opacity = '0';
    foreverEl.style.transform = 'translate(-50%, -50%) scale(0)';
    heartContainer.style.animation = 'crystalPulse 3s ease-in-out infinite';
  }, 5000);
}

/* ========================================================
   INIT
   ======================================================== */
resize();
setupTree();
setupScrollObserver();
loop();

// Single click handler on the crystal heart
document.getElementById('crystal-heart-wrap').addEventListener('click', triggerBloom);

window.addEventListener('resize', () => {
  resize();
  setupTree();
});
</script>
